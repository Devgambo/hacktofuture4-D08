# Production backend stack for a single AWS EC2 host.
#
#   Frontend  → Vercel (separate; see docs/DEPLOYMENT_AWS_VERCEL.md)
#   Database  → Neon or RDS (external; set DATABASE_URL in server/.env)
#   This file → runs the FastAPI backend behind Caddy (auto-HTTPS).
#
# Usage (from the repo root on the EC2 box):
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
#
# Build context is the repo root so server/Dockerfile can COPY server/*.
services:
  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    env_file: ../server/.env
    expose:
      - "8000"
    # Single replica only — shared state is in-process (jobs/events/SSE).
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
