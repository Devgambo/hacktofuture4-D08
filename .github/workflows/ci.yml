name: CI

on:
  push:
    branches: [main, deploy]
  pull_request:

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: server
        run: uv sync --frozen

      - name: Run parser tests
        # test_parser.py imports server.rsi.parser; run from repo root.
        # pytest isn't a project dependency, so provision it with --with.
        run: uv run --project server --with pytest python -m pytest test_parser.py -v

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (tsc + vite)
        run: npm run build
